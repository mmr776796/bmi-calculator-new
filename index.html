<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI 计算器</title>
<style>
  :root {
    --orange-300: #e4c0a0;
    --orange-400: #d4a07a;
    --orange-500: #c0845e;
    --orange-600: #a86f4a;
    --orange-700: #8b5635;
    --text:       #4a2a1a;
    --text-soft:  #6b4630;
    --white:      #ffffff;
    --border:     #e0ccb8;
    --bg-warm:    #faf5ef;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    background: transparent;
    font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: var(--text);
  }

  button, input { font: inherit; }

  .calculator-card {
    width: 420px;
    max-width: 100%;
    background: rgba(255, 252, 247, 0.85);
    border: 2px solid var(--orange-300);
    border-radius: 16px;
    padding: 36px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  h1 {
    text-align: center;
    color: var(--orange-600);
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  /* ---- 输入组 ---- */
  .input-group {
    background: transparent;
    border: 1px solid #e0ccb8;
    border-radius: 12px;
    padding: 16px 20px;
  }

  .input-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 700;
  }

  .label-icon {
    display: inline-grid;
    width: 28px;
    height: 28px;
    place-items: center;
    color: var(--white);
    background: var(--orange-400);
    border-radius: 8px;
    font-size: 0.9rem;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  /* ======== 自定义滑块 ======== */
  .custom-slider {
    position: relative;
    flex: 1;
    min-width: 180px;
    height: 60px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 轨道 */
  .custom-slider .track {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 5px;
    margin-top: -2px;
    background:
      repeating-linear-gradient(90deg, transparent 0 9px, rgba(139, 86, 53, 0.12) 9px 10px),
      rgba(212, 160, 122, 0.35);
    border-radius: 3px;
    border: 0.5px dashed rgba(139, 86, 53, 0.25);
    pointer-events: none;
  }

  .custom-slider .track-fill {
    position: absolute;
    left: 0;
    top: 50%;
    height: 5px;
    margin-top: -2px;
    background:
      repeating-linear-gradient(90deg, transparent 0 7px, rgba(168, 111, 74, 0.2) 7px 8px),
      var(--orange-400);
    border-radius: 3px 0 0 3px;
    pointer-events: none;
  }

  .custom-slider.dragging .thumb {
    filter: brightness(0.9) contrast(1.2) drop-shadow(2px 3px 0 rgba(139,86,53,0.2));
    transform: scale(1.05);

  /* ---- 数字输入 ---- */
  .number-input {
    width: 76px;
    padding: 8px 4px;
    color: var(--text);
    background: var(--white);
    border: 2px solid #e0ccb8;
    border-radius: 8px;
    outline: none;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    -moz-appearance: textfield;
    transition: border-color 150ms ease;
    flex-shrink: 0;
  }

  .number-input::-webkit-inner-spin-button,
  .number-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  .number-input:focus { border-color: var(--orange-500); }

  .unit-label {
    min-width: 32px;
    color: var(--text-soft);
    font-size: 0.9rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ---- 计算按钮 ---- */
  .calc-btn {
    width: 100%;
    padding: 14px 20px;
    color: var(--white);
    background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(168, 111, 74, 0.25);
    transition: all 180ms ease;
  }

  .calc-btn:hover {
    background: linear-gradient(135deg, var(--orange-600), var(--orange-700));
    box-shadow: 0 8px 24px rgba(168, 111, 74, 0.3);
    transform: translateY(-1px);
  }

  .calc-btn:active { transform: scale(0.97); }

  /* ---- 结果区域 ---- */
  .result-area {
    text-align: center;
    background: transparent;
    border: 2px solid #e0ccb8;
    border-radius: 12px;
    padding: 20px 16px;
  }

  .bmi-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }

  .bmi-number {
    color: var(--orange-600);
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
  }

  .bmi-unit {
    color: var(--text-soft);
    font-size: 0.85rem;
    font-weight: 600;
  }

  :focus-visible { outline: 2.5px solid var(--orange-400); outline-offset: 3px; }

  @media (max-width: 460px) {
    body { padding: 14px; }
    .calculator-card { padding: 28px 18px 24px; gap: 20px; }
    h1 { font-size: 1.5rem; }
    .input-group { padding: 14px; }
    .number-input { width: 64px; font-size: 1rem; }
    .calc-btn { font-size: 1.1rem; padding: 12px 16px; }
    .bmi-number { font-size: 2.5rem; }
    .custom-slider .thumb { width: 55px; height: 54px; margin-left: -27px; margin-top: -34px; }
  }
</style>

<body>

<div class="calculator-card">
  <h1>计算你的 BMI</h1>

  <!-- 身高 -->
  <div class="input-group">
    <label><span class="label-icon" aria-hidden="true">↕</span> 身高</label>
    <div class="slider-row">
      <div class="custom-slider" id="sliderH">
        <div class="track"></div>
        <div class="track-fill" id="fillH"></div>
        <div class="thumb" id="thumbH"></div>
      </div>
      <input type="number" class="number-input" id="inputH" value="1.70" min="1.00" max="2.20" step="0.01" inputmode="decimal">
      <span class="unit-label">米</span>
    </div>
  </div>

  <!-- 体重 -->
  <div class="input-group">
    <label><span class="label-icon" aria-hidden="true">≈</span> 体重</label>
    <div class="slider-row">
      <div class="custom-slider" id="sliderW">
        <div class="track"></div>
        <div class="track-fill" id="fillW"></div>
        <div class="thumb" id="thumbW"></div>
      </div>
      <input type="number" class="number-input" id="inputW" value="65" min="30" max="150" step="0.5" inputmode="decimal">
      <span class="unit-label">千克</span>
    </div>
  </div>

  <button class="calc-btn" id="calcBtn">算一算</button>

  <div class="result-area" id="resultArea" aria-live="polite">
    <div class="bmi-row">
      <span class="bmi-number" id="bmiValue">--</span>
      <span class="bmi-unit">千克/米&#178;</span>
    </div>
  </div>
</div>

<script>
(function() {
  // ===== 共享拖动状态：只允许同时拖一个 =====
  var activeSlider = null;

  // 全局 move/end —— 只驱动 activeSlider
  document.addEventListener('mousemove', function(e) {
    if (!activeSlider) return;
    var pct = (function() {
      var rect = activeSlider.getBoundingClientRect();
      var cx = e.clientX;
      return ((cx - rect.left) / rect.width) * 100;
    })();
    var v = activeSlider._pctToVal(pct);
    activeSlider._set(v);
  });

  document.addEventListener('mouseup', function() {
    if (activeSlider) {
      activeSlider.classList.remove('dragging');
      activeSlider = null;
    }
  });

  document.addEventListener('touchmove', function(e) {
    if (!activeSlider) return;
    var pct = (function() {
      var rect = activeSlider.getBoundingClientRect();
      var cx = e.touches[0].clientX;
      return ((cx - rect.left) / rect.width) * 100;
    })();
    var v = activeSlider._pctToVal(pct);
    activeSlider._set(v);
  }, { passive: false });

  document.addEventListener('touchend', function() {
    if (activeSlider) {
      activeSlider.classList.remove('dragging');
      activeSlider = null;
    }
  });

  // 元素
  var inputH = document.getElementById('inputH');
  var inputW = document.getElementById('inputW');
  var fillH  = document.getElementById('fillH');
  var fillW  = document.getElementById('fillW');
  var thumbH = document.getElementById('thumbH');
  var thumbW = document.getElementById('thumbW');
  var resultArea = document.getElementById('resultArea');
  var bmiValueEl = document.getElementById('bmiValue');
  var calcBtn    = document.getElementById('calcBtn');

  function updateBMI() {
    var h = parseFloat(inputH.value);
    var w = parseFloat(inputW.value);
    if (isNaN(h) || isNaN(w)) return;
    var bmi = w / (h * h);
    bmiValueEl.textContent = bmi.toFixed(1);
  }

  // 创建两个滑块，把 _pctToVal / _set 挂在 DOM 上供全局事件用
  var sliderH, sliderW;

  (function() {
    var wrap = document.getElementById('sliderH');
    var min = 1.00, max = 2.20, step = 0.01, decimals = 2;

    function valToPct(v) { return ((v - min) / (max - min)) * 100; }
    function pctToVal(pct) {
      var v = min + (pct / 100) * (max - min);
      v = Math.round(v / step) * step;
      if (v < min) v = min; if (v > max) v = max;
      return +v.toFixed(decimals);
    }
    function setValue(v) {
      v = pctToVal(valToPct(v));
      inputH.value = v.toFixed(decimals);
      moveThumb(v);
    }
    function moveThumb(v) {
      v = Math.min(max, Math.max(min, v));
      var pct = valToPct(v);
      fillH.style.width = pct + '%';
      thumbH.style.left = pct + '%';
    }
    wrap._pctToVal = pctToVal;
    wrap._set = function(v) { setValue(v); };

    wrap.addEventListener('mousedown', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    });
    wrap.addEventListener('touchstart', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.touches[0].clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    }, { passive: false });

    setValue(parseFloat(inputH.value));
    sliderH = { setValue: setValue, moveThumb: moveThumb, getValue: function() { return parseFloat(inputH.value); } };
  })();

  (function() {
    var wrap = document.getElementById('sliderW');
    var min = 30, max = 150, step = 0.5, decimals = 1;

    function valToPct(v) { return ((v - min) / (max - min)) * 100; }
    function pctToVal(pct) {
      var v = min + (pct / 100) * (max - min);
      v = Math.round(v / step) * step;
      if (v < min) v = min; if (v > max) v = max;
      return +v.toFixed(decimals);
    }
    function setValue(v) {
      v = pctToVal(valToPct(v));
      inputW.value = v.toFixed(decimals);
      moveThumb(v);
    }
    function moveThumb(v) {
      v = Math.min(max, Math.max(min, v));
      var pct = valToPct(v);
      fillW.style.width = pct + '%';
      thumbW.style.left = pct + '%';
    }
    wrap._pctToVal = pctToVal;
    wrap._set = function(v) { setValue(v); };

    wrap.addEventListener('mousedown', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    });
    wrap.addEventListener('touchstart', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.touches[0].clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    }, { passive: false });

    setValue(parseFloat(inputW.value));
    sliderW = { setValue: setValue, moveThumb: moveThumb, getValue: function() { return parseFloat(inputW.value); } };
  })();

  // 输入框 —— 实时移小人，不打断输入
  function syncHeightInput() {
    var raw = inputH.value.trim();
    if (raw === '' || raw === '-' || raw === '.') return;
    var v = parseFloat(raw);
    if (isNaN(v)) return;
    sliderH.moveThumb(v);
  }

  function fixHeightInput() {
    var raw = inputH.value.trim();
    if (raw === '' || raw === '-' || raw === '.') {
      sliderH.setValue(1.70);
      return;
    }
    var v = parseFloat(raw);
    if (isNaN(v)) { sliderH.setValue(sliderH.getValue()); return; }
    v = Math.min(2.20, Math.max(1.00, v));
    v = Math.round(v * 100) / 100;
    sliderH.setValue(v);
  }

  function syncWeightInput() {
    var raw = inputW.value.trim();
    if (raw === '' || raw === '-' || raw === '.') return;
    var v = parseFloat(raw);
    if (isNaN(v)) return;
    sliderW.moveThumb(v);
  }

  function fixWeightInput() {
    var raw = inputW.value.trim();
    if (raw === '' || raw === '-' || raw === '.') {
      sliderW.setValue(65);
      return;
    }
    var v = parseFloat(raw);
    if (isNaN(v)) { sliderW.setValue(sliderW.getValue()); return; }
    v = Math.min(150, Math.max(30, v));
    v = Math.round(v * 2) / 2;
    sliderW.setValue(v);
  }

  inputH.addEventListener('input', syncHeightInput);
  inputH.addEventListener('blur', fixHeightInput);
  inputH.addEventListener('keydown', function(e) { if (e.key === 'Enter') { fixHeightInput(); updateBMI(); } });

  inputW.addEventListener('input', syncWeightInput);
  inputW.addEventListener('blur', fixWeightInput);
  inputW.addEventListener('keydown', function(e) { if (e.key === 'Enter') { fixWeightInput(); updateBMI(); } });

  // 计算按钮
  calcBtn.addEventListener('click', function() {
    fixHeightInput();
    fixWeightInput();
    updateBMI();
  });
})();
</script>
</body>
</html>
