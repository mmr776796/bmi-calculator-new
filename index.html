<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI 计算器</title>
<style>
  :root {
    --orange-300: #fdba74;
    --orange-400: #fb923c;
    --orange-500: #f97316;
    --orange-600: #ea580c;
    --orange-700: #c2410c;
    --text:       #431407;
    --text-soft:  #7c2d12;
    --white:      #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    background: transparent;
    font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: var(--text);
  }

  button, input { font: inherit; }

  .calculator-card {
    width: 420px;
    max-width: 100%;
    background: transparent;
    border: 2px solid var(--orange-300);
    border-radius: 16px;
    padding: 36px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  h1 {
    text-align: center;
    color: var(--orange-600);
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  /* ---- 性别切换 ---- */
  .gender-toggle {
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .gender-btn {
    flex: 1;
    max-width: 140px;
    padding: 10px 20px;
    color: var(--text-soft);
    background: transparent;
    border: 2px solid #fdba74;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 180ms ease;
  }

  .gender-btn:hover { background: #ffedd5; border-color: var(--orange-300); }

  .gender-btn.active {
    color: var(--white);
    background: var(--orange-500);
    border-color: var(--orange-500);
    box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
  }

  /* ---- 输入组 ---- */
  .input-group {
    background: transparent;
    border: 1px solid #fed7aa;
    border-radius: 12px;
    padding: 16px 20px;
  }

  .input-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 700;
  }

  .label-icon {
    display: inline-grid;
    width: 28px;
    height: 28px;
    place-items: center;
    color: var(--white);
    background: var(--orange-400);
    border-radius: 8px;
    font-size: 0.9rem;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  /* ======== 自定义滑块 ======== */
  .custom-slider {
    position: relative;
    flex: 1;
    height: 60px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 轨道 */
  .custom-slider .track {
    position: absolute;
    left: 28px;
    right: 28px;
    top: 50%;
    height: 5px;
    margin-top: -2px;
    background:
      repeating-linear-gradient(90deg, transparent 0 9px, rgba(154, 52, 18, 0.15) 9px 10px),
      rgba(253, 186, 116, 0.45);
    border-radius: 3px;
    border: 0.5px dashed rgba(92, 45, 20, 0.3);
    pointer-events: none;
  }

  .custom-slider .track-fill {
    position: absolute;
    left: 28px;
    top: 50%;
    height: 5px;
    margin-top: -2px;
    background:
      repeating-linear-gradient(90deg, transparent 0 7px, rgba(194, 65, 12, 0.25) 7px 8px),
      var(--orange-400);
    border-radius: 3px 0 0 3px;
    pointer-events: none;
  }

  /* 奔跑小人 —— 拖动手柄 */
  .custom-slider .thumb {
    position: absolute;
    top: 50%;
    width: 70px;
    height: 68px;
    margin-left: -35px;
    margin-top: -42px;
    pointer-events: none;
    z-index: 5;
    background: url('runner.png') center/contain no-repeat;
    /* 铅笔画滤镜 */
    filter: brightness(0.95) contrast(1.1);
  }

  .custom-slider.dragging .thumb {
    filter: brightness(0.9) contrast(1.2) drop-shadow(2px 3px 0 rgba(92,45,20,0.25));
    transform: scale(1.05);
  }

  /* ---- 数字输入 ---- */
  .number-input {
    width: 76px;
    padding: 8px 4px;
    color: var(--text);
    background: var(--white);
    border: 2px solid #fed7aa;
    border-radius: 8px;
    outline: none;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    -moz-appearance: textfield;
    transition: border-color 150ms ease;
    flex-shrink: 0;
  }

  .number-input::-webkit-inner-spin-button,
  .number-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  .number-input:focus { border-color: var(--orange-500); }

  .unit-label {
    min-width: 32px;
    color: var(--text-soft);
    font-size: 0.9rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ---- 计算按钮 ---- */
  .calc-btn {
    width: 100%;
    padding: 14px 20px;
    color: var(--white);
    background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
    transition: all 180ms ease;
  }

  .calc-btn:hover {
    background: linear-gradient(135deg, var(--orange-600), var(--orange-700));
    box-shadow: 0 8px 24px rgba(249, 115, 22, 0.4);
    transform: translateY(-1px);
  }

  .calc-btn:active { transform: scale(0.97); }

  /* ---- 结果区域 ---- */
  .result-area {
    display: none;
    text-align: center;
    background: transparent;
    border: 2px solid #fed7aa;
    border-radius: 12px;
    padding: 20px 16px;
  }

  .bmi-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }

  .bmi-number {
    color: var(--orange-600);
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
  }

  .bmi-unit {
    color: var(--text-soft);
    font-size: 0.85rem;
    font-weight: 600;
  }

  :focus-visible { outline: 2.5px solid var(--orange-400); outline-offset: 3px; }

  @media (max-width: 460px) {
    body { padding: 14px; }
    .calculator-card { padding: 28px 18px 24px; gap: 20px; }
    h1 { font-size: 1.5rem; }
    .gender-btn { padding: 8px 14px; font-size: 0.95rem; }
    .input-group { padding: 14px; }
    .number-input { width: 64px; font-size: 1rem; }
    .calc-btn { font-size: 1.1rem; padding: 12px 16px; }
    .bmi-number { font-size: 2.5rem; }
    .custom-slider .thumb { width: 55px; height: 54px; margin-left: -27px; margin-top: -34px; }
  }
</style>
</head>
<body>

<div class="calculator-card">
  <h1>计算你的 BMI</h1>

  <div class="gender-toggle" aria-label="选择性别">
    <button class="gender-btn active" data-gender="male">♂ 男生</button>
    <button class="gender-btn" data-gender="female">♀ 女生</button>
  </div>

  <!-- 身高 -->
  <div class="input-group">
    <label><span class="label-icon" aria-hidden="true">↕</span> 身高</label>
    <div class="slider-row">
      <div class="custom-slider" id="sliderH">
        <div class="track"></div>
        <div class="track-fill" id="fillH"></div>
        <div class="thumb" id="thumbH"></div>
      </div>
      <input type="number" class="number-input" id="inputH" value="1.70" min="1.00" max="2.20" step="0.01" inputmode="decimal">
      <span class="unit-label">米</span>
    </div>
  </div>

  <!-- 体重 -->
  <div class="input-group">
    <label><span class="label-icon" aria-hidden="true">≈</span> 体重</label>
    <div class="slider-row">
      <div class="custom-slider" id="sliderW">
        <div class="track"></div>
        <div class="track-fill" id="fillW"></div>
        <div class="thumb" id="thumbW"></div>
      </div>
      <input type="number" class="number-input" id="inputW" value="65" min="30" max="150" step="0.5" inputmode="decimal">
      <span class="unit-label">千克</span>
    </div>
  </div>

  <button class="calc-btn" id="calcBtn">算一算</button>

  <div class="result-area" id="resultArea" aria-live="polite">
    <div class="bmi-row">
      <span class="bmi-number" id="bmiValue">--</span>
      <span class="bmi-unit">千克/米&#178;</span>
    </div>
  </div>
</div>

<script>
(function() {
  // ===== 共享拖动状态：只允许同时拖一个 =====
  var activeSlider = null;

  function makeSlider(wrapId, fillEl, thumbEl, inputEl, min, max, step, decimals) {
    var wrap  = document.getElementById(wrapId);
    var fill  = fillEl;   // already resolved element
    var thumb = thumbEl;

    function valToPct(v) {
      return ((v - min) / (max - min)) * 100;
    }

    function pctToVal(pct) {
      var v = min + (pct / 100) * (max - min);
      v = Math.round(v / step) * step;
      if (v < min) v = min;
      if (v > max) v = max;
      return decimals === 0 ? v : +v.toFixed(decimals);
    }

    function setValue(v, notify) {
      v = pctToVal(valToPct(v));
      inputEl.value = decimals === 0 ? v : v.toFixed(decimals);
      var pct = valToPct(v);
      // 轨道有 28px 左右边距，需要换算
      fill.style.width = pct + '%';
      thumb.style.left = pct + '%';
      if (notify !== false && wrap._onChange) wrap._onChange(v);
    }

    function getValue() {
      return parseFloat(inputEl.value);
    }

    function eventPct(e) {
      var rect = wrap.getBoundingClientRect();
      var cx = e.touches ? e.touches[0].clientX : e.clientX;
      return ((cx - rect.left) / rect.width) * 100;
    }

    wrap.addEventListener('mousedown', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal(eventPct(e)));
      e.preventDefault();
    });

    wrap.addEventListener('touchstart', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal(eventPct(e)));
      e.preventDefault();
    }, { passive: false });

    setValue(parseFloat(inputEl.value), false);

    return { setValue: setValue, getValue: getValue };
  }

  // 全局 move/end —— 只驱动 activeSlider
  document.addEventListener('mousemove', function(e) {
    if (!activeSlider) return;
    var pct = (function() {
      var rect = activeSlider.getBoundingClientRect();
      var cx = e.clientX;
      return ((cx - rect.left) / rect.width) * 100;
    })();
    var v = activeSlider._pctToVal(pct);
    activeSlider._set(v);
  });

  document.addEventListener('mouseup', function() {
    if (activeSlider) {
      activeSlider.classList.remove('dragging');
      activeSlider = null;
    }
  });

  document.addEventListener('touchmove', function(e) {
    if (!activeSlider) return;
    var pct = (function() {
      var rect = activeSlider.getBoundingClientRect();
      var cx = e.touches[0].clientX;
      return ((cx - rect.left) / rect.width) * 100;
    })();
    var v = activeSlider._pctToVal(pct);
    activeSlider._set(v);
  }, { passive: false });

  document.addEventListener('touchend', function() {
    if (activeSlider) {
      activeSlider.classList.remove('dragging');
      activeSlider = null;
    }
  });

  // 元素
  var inputH = document.getElementById('inputH');
  var inputW = document.getElementById('inputW');
  var fillH  = document.getElementById('fillH');
  var fillW  = document.getElementById('fillW');
  var thumbH = document.getElementById('thumbH');
  var thumbW = document.getElementById('thumbW');
  var resultArea = document.getElementById('resultArea');
  var bmiValueEl = document.getElementById('bmiValue');
  var calcBtn    = document.getElementById('calcBtn');
  var genderBtns = document.querySelectorAll('.gender-btn');
  var gender = 'male';

  function updateBMI() {
    var h = parseFloat(inputH.value);
    var w = parseFloat(inputW.value);
    if (isNaN(h) || isNaN(w)) return;
    var bmi = w / (h * h);
    resultArea.style.display = 'block';
    bmiValueEl.textContent = bmi.toFixed(1);
  }

  // 创建两个滑块，把 _pctToVal / _set 挂在 DOM 上供全局事件用
  var sliderH, sliderW;

  (function() {
    var wrap = document.getElementById('sliderH');
    var min = 1.00, max = 2.20, step = 0.01, decimals = 2;

    function valToPct(v) { return ((v - min) / (max - min)) * 100; }
    function pctToVal(pct) {
      var v = min + (pct / 100) * (max - min);
      v = Math.round(v / step) * step;
      if (v < min) v = min; if (v > max) v = max;
      return +v.toFixed(decimals);
    }
    function setValue(v, notify) {
      v = pctToVal(valToPct(v));
      inputH.value = v.toFixed(decimals);
      var pct = valToPct(v);
      fillH.style.width = pct + '%';
      thumbH.style.left = pct + '%';
      if (notify !== false) updateBMI();
    }
    wrap._pctToVal = pctToVal;
    wrap._set = function(v) { setValue(v); };
    wrap._onChange = updateBMI;

    wrap.addEventListener('mousedown', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    });
    wrap.addEventListener('touchstart', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.touches[0].clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    }, { passive: false });

    setValue(parseFloat(inputH.value), false);
    sliderH = { setValue: setValue, getValue: function() { return parseFloat(inputH.value); } };
  })();

  (function() {
    var wrap = document.getElementById('sliderW');
    var min = 30, max = 150, step = 0.5, decimals = 1;

    function valToPct(v) { return ((v - min) / (max - min)) * 100; }
    function pctToVal(pct) {
      var v = min + (pct / 100) * (max - min);
      v = Math.round(v / step) * step;
      if (v < min) v = min; if (v > max) v = max;
      return +v.toFixed(decimals);
    }
    function setValue(v, notify) {
      v = pctToVal(valToPct(v));
      inputW.value = v.toFixed(decimals);
      var pct = valToPct(v);
      fillW.style.width = pct + '%';
      thumbW.style.left = pct + '%';
      if (notify !== false) updateBMI();
    }
    wrap._pctToVal = pctToVal;
    wrap._set = function(v) { setValue(v); };
    wrap._onChange = updateBMI;

    wrap.addEventListener('mousedown', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    });
    wrap.addEventListener('touchstart', function(e) {
      activeSlider = wrap;
      wrap.classList.add('dragging');
      setValue(pctToVal((function() {
        var r = wrap.getBoundingClientRect();
        return ((e.touches[0].clientX - r.left) / r.width) * 100;
      })()));
      e.preventDefault();
    }, { passive: false });

    setValue(parseFloat(inputW.value), false);
    sliderW = { setValue: setValue, getValue: function() { return parseFloat(inputW.value); } };
  })();

  // 输入框同步
  inputH.addEventListener('blur', function() {
    var raw = inputH.value.trim();
    if (!raw) return;
    var v = parseFloat(raw);
    if (isNaN(v)) { sliderH.setValue(sliderH.getValue()); return; }
    if (v < 1.00) v = 1.00; if (v > 2.20) v = 2.20;
    v = Math.round(v * 100) / 100;
    sliderH.setValue(v);
  });
  inputH.addEventListener('change', function() { inputH.dispatchEvent(new Event('blur')); });

  inputW.addEventListener('blur', function() {
    var raw = inputW.value.trim();
    if (!raw) return;
    var v = parseFloat(raw);
    if (isNaN(v)) { sliderW.setValue(sliderW.getValue()); return; }
    if (v < 30) v = 30; if (v > 150) v = 150;
    sliderW.setValue(v);
  });
  inputW.addEventListener('change', function() { inputW.dispatchEvent(new Event('blur')); });

  // 性别
  genderBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      genderBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      gender = btn.dataset.gender;
      updateBMI();
    });
  });

  // 计算按钮
  calcBtn.addEventListener('click', function() {
    inputH.dispatchEvent(new Event('blur'));
    inputW.dispatchEvent(new Event('blur'));
    updateBMI();
  });

  updateBMI();
})();
</script>
</body>
</html>
